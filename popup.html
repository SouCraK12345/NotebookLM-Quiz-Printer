<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NotebookLM Quiz Printer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Quiz Printer</h1>
        <p>NotebookLMで、印刷したいクイズのページを開いて実行してください。</p>
      </header>

      <section class="settings" aria-label="Print settings">
        <label>
          <span>Title</span>
          <input id="title" type="text" value="Worksheet">
        </label>
        <label class="check">
          <input id="includeHints" type="checkbox">
          <span>ヒントを含める</span>
        </label>
        <label class="check">
          <input id="includeRationales" type="checkbox" checked>
          <span>答えを含める</span>
        </label>
      </section>

      <button id="create" type="button">ワークシートを作成</button>
      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
